<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link rel="icon" href="../images/icon_pg.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/style-contact.css" />
  </head>
  <body>
    <header class="detail-header">
      <a class="detail-header__back" href="#btn-back" data-state="focus"
        ><i class="fa-solid fa-arrow-left"></i
      ></a>
      <p class="detail-header__title">Contacto</p>
    </header>
    <main class="contact-page">
      <h1 class="contact-page__title">¿Tienes alguna pregunta?</h1>
      <p class="contact-page__intro">
        Nos encantaría escucharte. Rellena el formulario y te responderemos
        pronto.
      </p>
      <form class="contact-form" action="/my-handling-form-page" method="post">
        <ul class="contact-form__list">
          <li class="contact-form__item">
            <label class="contact-form__label" for="name">Nombre</label>
            <input
              class="contact-form__input"
              type="text"
              id="name"
              name="user_name"
            />
          </li>
          <li class="contact-form__item">
            <label class="contact-form__label" for="mail">Email</label>
            <input
              class="contact-form__input"
              type="email"
              id="mail"
              name="user_mail"
            />
          </li>
          <li class="contact-form__item">
            <label class="contact-form__label" for="tlf">Teléfono</label>
            <input
              class="contact-form__input"
              type="number"
              id="tlf"
              name="user_tel"
            />
          </li>
          <li class="contact-form__item">
            <label class="contact-form__label" for="msg">Mensaje</label>
            <textarea
              class="contact-form__textarea"
              id="msg"
              name="user_message"
            ></textarea>
          </li>
          <li class="contact-form__item">
            <label class="contact-form__terms" for="terms">
              <input
                class="contact-form__checkbox"
                type="checkbox"
                id="terms"
                name="user_terms"
              />
              Acepto términos y condiciones
            </label>
          </li>
        </ul>
      </form>
      <div class="contact-steps">
        <p class="contact-steps__title">¿Qué sucede después?</p>
        <div class="contact-steps__item">
          <div class="contact-steps__circle">1</div>
          <span>Revisamos tu mensaje en menos de 24 horas</span>
        </div>
        <div class="contact-steps__item">
          <div class="contact-steps__circle">2</div>
          <span>Un miembro del equipo se pondrá en contacto contigo</span>
        </div>
        <div class="contact-steps__item">
          <div class="contact-steps__circle">3</div>
          <span>Resolveremos tus dudas o procesaremos tu solicitud</span>
        </div>
      </div>
    </main>
  </body>
</html>
